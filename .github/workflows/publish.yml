name: Publish to PyPI

on:
  release:
    types: [published] # Kích hoạt khi bạn bấm "Publish release" trên GitHub
  # Hoặc kích hoạt khi có tag mới:
  # push:
  #   tags:
  #     - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Bắt buộc để dùng PyPI Trusted Publishers

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-python: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build

    - name: Build package
      run: python -m build

    - name: Publish to PyPI
      uses: pypa/github-action-pypackage-release@release/v1
